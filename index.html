<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Lumine.js Documentation</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: #e6e6e6;
      font-family: system-ui;
    }

    .navbar {
      border-bottom: 1px solid #333;
    }

    .sidebar {
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      width: 260px;
      overflow: auto;
      background: #161616;
      border-right: 1px solid #2a2a2a;
      padding: 15px;
      transition: transform .3s ease;
      z-index: 1000;
    }

    .sidebar h6 {
      color: #888;
      margin-top: 18px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .sidebar a {
      display: block;
      padding: 6px 10px;
      color: #bbb;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .sidebar a:hover {
      background: #222;
      color: #fff;
    }

    .content {
      margin-left: 260px;
      padding: 40px;
      max-width: 1000px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
    }

    .hero p {
      color: #999;
    }

    .section-title {
      margin-top: 40px;
      margin-bottom: 15px;
      font-weight: 600;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
    }

    .member-card {
      background: #171717;
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .member-card h5 {
      margin-bottom: 6px;
    }

    pre {
      border-radius: 8px;
      background: #111;
      padding: 14px;
      overflow: auto;
    }

    code {
      color: #ffb454;
    }

    table {
      margin-top: 10px;
    }

    table th {
      background: #1a1a1a;
    }

    table td,
    table th {
      border-color: #333 !important;
    }

    @media (max-width:992px) {

      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .content {
        margin-left: 0;
        padding: 25px;
      }

      .hero h1 {
        font-size: 2rem;
      }

    }
  </style>

  <script>

    let documentation = null

    async function init() {

      const res = await fetch("docs.json")
      documentation = await res.json()

      buildSidebar()
      handleHash()

    }

    window.addEventListener("hashchange", handleHash)

    function toggleSidebar() {
      $(".sidebar").toggleClass("active")
    }

    function handleHash() {

      const hash = location.hash

      if (!hash || hash === "#") {
        renderHome()
        return
      }

      pathManager(hash)

    }

    function buildSidebar() {

      let html = ""

      documentation.docs.forEach(module => {

        html += `<h6>${module.name} v${module.version}</h6>`

        module.docs.forEach(cls => {

          html += `
<a href="#/${module.name}v${module.version}/${cls.name}" onclick="toggleSidebar()">
${cls.name}
</a>
`

        })

      })

      $("#sidebar").html(html)

    }

    function renderHome() {

      $("#content").html(`

<div class="hero">

<h1>✨ Lumine.js</h1>
<p>Multi platform bot framework</p>

<div class="mt-4">
<pre><code class="language-bash">npm install Lumine-js/lumined.js</code></pre>
</div>

<div class="mt-4 col-md-4 mx-auto">
<input id="search" class="form-control" placeholder="Search documentation">
</div>

</div>

`)

      hljs.highlightAll()

    }

    function pathManager(path) {

      path = path.replace("#/", "")
      const parts = path.split("/")

      if (parts.length < 2) {
        render404()
        return
      }

      const modulePart = parts[0]
      const className = parts[1]

      const moduleMatch = modulePart.match(/(.+)v(.+)/)

      if (!moduleMatch) {
        render404()
        return
      }

      const moduleName = moduleMatch[1]
      const version = moduleMatch[2]

      const module = documentation.docs.find(
        m => m.name === moduleName && m.version === version
      )

      if (!module) {
        render404()
        return
      }

      const cls = module.docs.find(d => d.name === className)

      if (!cls) {
        render404()
        return
      }

      renderClass(cls)

    }

    function renderClass(cls) {

      let html = `
<h1>${cls.name}</h1>
<p class="text-secondary">${cls.description || ""}</p>
`

      if (cls.constructor) {

        html += `

<h3 class="section-title">Constructor</h3>

<div class="member-card">

<pre><code class="language-javascript">${escapeHTML(cls.constructor.signature)}</code></pre>

<p>${cls.constructor.description || ""}</p>

${renderParams(cls.constructor.params)}
${renderExamples(cls.constructor.examples)}

</div>
`

      }

      const properties = cls.members?.filter(x => x.kind === "property") || []
      const methods = cls.members?.filter(x => x.kind === "method") || []
      const events = cls.members?.filter(x => x.kind === "event") || []

      if (properties.length) {

        html += `<h3 class="section-title">Properties</h3>`

        properties.forEach(p => {

          html += `

<div class="member-card">

<h5>${p.name}</h5>
<div><code>${escapeHTML(p.type)}</code></div>

<p>${p.description || ""}</p>

</div>

`

        })

      }

      if (methods.length) {

        html += `<h3 class="section-title">Methods</h3>`

        methods.forEach(m => {

          html += `

<div class="member-card">

<h5>${m.name}</h5>

<pre><code class="language-javascript">${escapeHTML(m.signature)}</code></pre>

<p>${m.description || ""}</p>

${renderParams(m.params)}
${renderExamples(m.examples)}

</div>

`

        })

      }

      if (events.length) {

        html += `<h3 class="section-title">Events</h3>`

        events.forEach(e => {

          html += `

<div class="member-card">

<h5>${e.name}</h5>

<p>${e.description || ""}</p>

${renderParams(e.params)}
${renderExamples(e.examples)}

</div>

`

        })

      }

      $("#content").html(html)

      hljs.highlightAll()

    }

    function renderParams(params) {

      if (!params || !params.length) return ""

      let html = `

<h6 class="mt-3">Parameters</h6>

<table class="table table-dark table-bordered">

<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Required</th>
<th>Description</th>
</tr>
</thead>

<tbody>
`

      params.forEach(p => {

        html += `

<tr>

<td>${p.name}</td>
<td><code>${escapeHTML(p.type)}</code></td>
<td>${p.required ? "Yes" : "No"}</td>
<td>${p.description || ""}</td>

</tr>

`

      })

      html += `

</tbody>
</table>
`

      return html

    }

    function renderExamples(examples) {

      if (!examples || !examples.length) return ""

      let html = `<h6 class="mt-3">Example</h6>`

      examples.forEach(e => {

        if (e.javascript) {
          html += `<pre><code class="language-javascript">${escapeHTML(e.javascript)}</code></pre>`
        }

        if (e.typescript) {
          html += `<pre><code class="language-typescript">${escapeHTML(e.typescript)}</code></pre>`
        }

      })

      return html

    }

    function render404() {

      $("#content").html(`

<div class="text-center p-5">
<h1>404</h1>
<p>Documentation not found</p>
<a href="#">Back to home</a>
</div>

`)

    }

    function escapeHTML(text) {

      if (!text) return ""

      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;")

    }

    $(document).on("keyup", "#search", function () {

      const q = $(this).val().toLowerCase()

      $(".sidebar a").each(function () {

        const text = $(this).text().toLowerCase()
        $(this).toggle(text.includes(q))

      })

    })

    window.onload = init

  </script>

</head>

<body>

  <nav class="navbar navbar-dark bg-warning sticky-top">

    <div class="container-fluid">

      <button class="btn btn-dark d-lg-none me-2" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <span class="navbar-brand text-dark fw-bold">
        Lumine.js Docs
      </span>

    </div>

  </nav>

  <div id="sidebar" class="sidebar"></div>
  <div id="content" class="content"></div>

</body>

</html>
